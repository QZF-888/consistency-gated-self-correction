<svg xmlns="http://www.w3.org/2000/svg" width="1485" height="420" viewBox="0 0 1485 420">
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3742"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #111827; }
      .math { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #111827; font-style: italic; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2.6; rx: 14; }
      .bluebox { fill: #eef5ff; stroke: #4f83ff; stroke-width: 2.6; rx: 14; }
      .orangebox { fill: #fff4e5; stroke: #d97706; stroke-width: 2.6; rx: 14; }
      .greenbox { fill: #edf9f0; stroke: #22a35a; stroke-width: 2.6; rx: 14; }
      .arrow { fill: none; stroke: #2f3742; stroke-width: 3.4; marker-end: url(#arrow-dark); }
      .arrow-blue { fill: none; stroke: #1f6feb; stroke-width: 3.4; marker-end: url(#arrow-blue); }
      .arrow-orange { fill: none; stroke: #b45309; stroke-width: 3.4; marker-end: url(#arrow-orange); }
      .decision { fill: #ffffff; stroke: #64748b; stroke-width: 2.4; }
    </style>
  </defs>

  <rect x="35" y="135" width="175" height="96" class="box"/>
  <text x="122" y="174" text-anchor="middle" class="label">Question</text>
  <text x="122" y="207" text-anchor="middle" class="math">x</text>

  <path d="M 210 183 L 280 183" class="arrow"/>

  <rect x="285" y="116" width="190" height="130" class="bluebox"/>
  <text x="380" y="164" text-anchor="middle" class="label">Direct</text>
  <text x="380" y="197" text-anchor="middle" class="small">answer</text>
  <text x="380" y="226" text-anchor="middle" class="math">a0</text>

  <path d="M 475 183 L 548 183" class="arrow"/>

  <rect x="550" y="55" width="205" height="250" class="box"/>
  <text x="652" y="100" text-anchor="middle" class="label">Sample K</text>
  <text x="652" y="146" text-anchor="middle" class="math">a1</text>
  <text x="652" y="186" text-anchor="middle" class="math">a2</text>
  <text x="652" y="226" text-anchor="middle" class="small">...</text>
  <text x="652" y="266" text-anchor="middle" class="math">aK</text>

  <path d="M 755 183 L 823 183" class="arrow"/>

  <rect x="825" y="84" width="230" height="190" class="orangebox"/>
  <text x="940" y="128" text-anchor="middle" class="label">Consistency</text>
  <text x="940" y="165" text-anchor="middle" class="math">c = count(ai=a0)/K</text>
  <path d="M 862 190 L 1018 190" stroke="#d97706" stroke-width="1.6"/>
  <text x="940" y="228" text-anchor="middle" class="small">majority</text>
  <text x="940" y="258" text-anchor="middle" class="math">m = mode(a1:K)</text>

  <path d="M 1055 183 L 1110 183" class="arrow"/>

  <path d="M 1182 102 L 1254 183 L 1182 264 L 1110 183 Z" class="decision"/>
  <text x="1182" y="193" text-anchor="middle" class="label">c &lt; tau?</text>

  <path d="M 1224 120 L 1322 66 L 1322 110" class="arrow-orange"/>
  <rect x="1322" y="26" width="110" height="82" class="orangebox"/>
  <text x="1377" y="62" text-anchor="middle" class="small">replace</text>
  <text x="1377" y="91" text-anchor="middle" class="math">m</text>

  <rect x="1206" y="156" width="142" height="80" class="greenbox"/>
  <text x="1277" y="191" text-anchor="middle" class="label">Final</text>
  <text x="1277" y="223" text-anchor="middle" class="small">answer</text>

  <path d="M 1224 246 L 1322 302 L 1322 265" class="arrow-blue"/>
  <rect x="1322" y="255" width="110" height="82" class="bluebox"/>
  <text x="1377" y="291" text-anchor="middle" class="small">keep</text>
  <text x="1377" y="320" text-anchor="middle" class="math">a0</text>
</svg>
